<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Game | Cakra Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background-color: #0b0e14; 
        color: white; 
        transition: background-color 0.3s, color 0.3s;
    }

    :root[data-theme="light"] body {
        background-color: #f0f4f9;
        color: #0f172a;
        background-image: 
            radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
            radial-gradient(at 90% 90%, rgba(147, 51, 234, 0.08) 0px, transparent 50%);
    }

    :root[data-theme="dark"] body {
        background-image: 
            radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
            radial-gradient(at 90% 90%, rgba(147, 51, 234, 0.05) 0px, transparent 50%);
    }

    .glass { 
        background: rgba(255, 255, 255, 0.03); 
        backdrop-filter: blur(10px); 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        color: white;
        transition: all 0.3s ease;
    }

    :root[data-theme="light"] .glass {
        background: rgba(255, 255, 255, 0.6);
        border: 1.5px solid rgba(59, 130, 246, 0.25);
        color: #0f172a;
        box-shadow: 0 8px 32px rgba(59, 130, 246, 0.12);
    }

    /* NAVBAR */
    nav {
        border-bottom: 1px solid rgba(59, 130, 246, 0.1);
    }

    :root[data-theme="light"] nav {
        background: rgba(248, 250, 252, 0.8) !important;
        border-bottom: 2px solid rgba(59, 130, 246, 0.2);
    }

    nav h1 {
        color: #3b82f6;
        text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    :root[data-theme="light"] nav h1 {
        text-shadow: none;
    }

    nav a {
        color: white;
        transition: color 0.3s;
    }

    :root[data-theme="light"] nav a {
        color: #0f172a;
    }

    nav a:hover {
        color: #3b82f6;
    }

    /* SEARCH BOX */
    #searchGame {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
    }

    :root[data-theme="light"] #searchGame {
        background: rgba(255, 255, 255, 0.7) !important;
        border: 1.5px solid rgba(59, 130, 246, 0.3) !important;
        color: #0f172a !important;
    }

    #searchGame::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    :root[data-theme="light"] #searchGame::placeholder {
        color: #94a3b8;
    }

    /* GAME ITEM */
    .game-item {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        transition: all 0.3s ease;
    }

    :root[data-theme="light"] .game-item {
        background: rgba(255, 255, 255, 0.6) !important;
        border: 1.5px solid rgba(59, 130, 246, 0.25) !important;
        color: #0f172a !important;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
    }

    .game-item:hover {
        transform: scale(1.05);
        border-color: rgba(59, 130, 246, 0.5) !important;
    }

    :root[data-theme="light"] .game-item:hover {
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.2);
    }

    .game-item p {
        color: white;
        font-weight: bold;
    }

    :root[data-theme="light"] .game-item p {
        color: #0f172a;
    }

    /* MODAL */
    #modal-maintenance {
        background: rgba(0, 0, 0, 0.8);
    }

    :root[data-theme="light"] #modal-maintenance {
        background: rgba(0, 0, 0, 0.4);
    }

    #modal-maintenance .glass {
        border-color: rgba(59, 130, 246, 0.3) !important;
    }

    :root[data-theme="light"] #modal-maintenance .glass {
        border-color: rgba(59, 130, 246, 0.25) !important;
    }

    #modal-maintenance h3 {
        color: white;
    }

    :root[data-theme="light"] #modal-maintenance h3 {
        color: #0f172a;
    }

    #modal-maintenance p {
        color: rgba(255, 255, 255, 0.7);
    }

    :root[data-theme="light"] #modal-maintenance p {
        color: #475569;
    }

    #modal-maintenance button {
        background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
        color: white !important;
    }

    #modal-maintenance button:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
    }

    /* ICON */
    i {
        transition: color 0.3s;
    }
</style>
</head>

<script>
    // INIT THEME DARI LOCAL STORAGE
    function initTheme() {
        const savedTheme = localStorage.getItem('cakra_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
    initTheme();
</script>

<body class="pb-20">

    <nav class="fixed top-0 w-full z-50 glass py-4 px-6">
        <div class="container mx-auto flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <h1 class="text-xl font-extrabold tracking-tighter text-blue-500 uppercase">Katalog Game</h1>
        </div>
    </nav>

    <section class="mt-28 container mx-auto px-6">
        <div class="glass p-2 rounded-2xl mb-10 flex items-center px-4">
            <i class="fas fa-search text-gray-500 mr-3"></i>
            <input type="text" id="searchGame" onkeyup="filterGame()" placeholder="Cari game kesukaanmu..." 
                class="bg-transparent w-full py-3 outline-none text-sm font-semibold placeholder:text-gray-600">
        </div>

        <div id="full-game-list" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </section>

    <div id="modal-maintenance" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass max-w-sm w-full p-8 rounded-3xl text-center border-blue-500/30 shadow-2xl">
            <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-tools text-3xl text-blue-500"></i>
            </div>
            <h3 class="text-2xl font-black uppercase mb-2">Segera Hadir!</h3>
            <p class="text-gray-400 text-sm leading-relaxed mb-8">
                Game ini sedang dalam tahap integrasi sistem. Tunggu kabar selanjutnya ya!
            </p>
            <button onclick="tutupModalKatalog()" 
               class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase tracking-widest transition-all">
                Oke, Siap!
            </button>
        </div>
    </div>

<script src="script.js"></script>

<script>
    function muatKatalogLengkap() {
        const container = document.getElementById('full-game-list');
        if (!container || typeof dataGame === 'undefined') return;

        container.innerHTML = ""; 

        Object.keys(dataGame).forEach(nama => {
            const game = dataGame[nama];
            const div = document.createElement('div');
            div.className = "game-item glass p-4 rounded-3xl cursor-pointer text-center hover:scale-105 transition-all";
            
            div.innerHTML = `
                <img src="${game.img}" class="w-full rounded-2xl mb-3 aspect-square object-cover">
                <p class="font-bold text-[10px] md:text-sm text-white truncate">${nama}</p>
            `;

div.onclick = () => {
    // 1. Cek apakah game yang diklik adalah ML atau FF
    if (nama === "Mobile Legends" || nama === "Free Fire") {
        // Jika iya, baru pindah ke halaman topup
        window.location.href = `index.html?game=${encodeURIComponent(nama)}`;
    } else {
        // 2. Jika SELAIN ML dan FF, tampilkan modal peringatan
        const modal = document.getElementById('modal-maintenance');
        const msg = document.getElementById('modal-msg');
        
        if (msg) {
            msg.innerText = "Maaf Bosku, layanan untuk " + nama + " belum tersedia. Pantau terus ya!";
        }
        
        if (modal) {
            modal.classList.remove('hidden'); // Memunculkan modal
        }
    }
};

            container.appendChild(div);
        });
    }

    function filterGame() {
        const input = document.getElementById('searchGame').value.toLowerCase();
        const items = document.getElementsByClassName('game-item');
        for (let i = 0; i < items.length; i++) {
            const title = items[i].getElementsByTagName('p')[0].innerText.toLowerCase();
            items[i].style.display = title.includes(input) ? "" : "none";
        }
    }

    function tutupModalKatalog() {
        document.getElementById('modal-maintenance').classList.add('hidden');
    }

    window.onload = () => {
        muatKatalogLengkap();
    };
</script>
</body>
</html>
