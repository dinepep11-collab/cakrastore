<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Cakra Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #030409 0%, #1a1f29 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black text-blue-500 mb-2">CAKRA STORE</h1>
        <p class="text-gray-400 text-sm">Admin Dashboard Login</p>
    </div>

    <!-- ERROR MESSAGE -->
    <div id="error-message" class="error-message">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span id="error-text"></span>
    </div>

    <form onsubmit="handleLogin(event)" class="space-y-4">
        <div>
            <label class="block text-sm font-bold mb-2">
                <i class="fas fa-envelope mr-2 text-blue-400"></i> Email
            </label>
            <input type="email" id="email" placeholder="admin@cakrastore.com" required 
                class="w-full bg-white/10 border border-white/20 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition-all"
                autocomplete="email">
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">
                <i class="fas fa-lock mr-2 text-blue-400"></i> Password
            </label>
            <input type="password" id="password" placeholder="••••••••" required 
                class="w-full bg-white/10 border border-white/20 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition-all"
                autocomplete="current-password">
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 py-3 rounded-lg font-black uppercase tracking-widest mt-6 transition-all active:scale-95 flex items-center justify-center gap-2"
            id="login-btn">
            <i class="fas fa-sign-in-alt"></i> LOGIN
        </button>
    </form>

    <!-- INFO BOX -->
    <div class="mt-8 p-4 bg-blue-500/10 border border-blue-500/20 rounded-lg text-center">
        <p class="text-xs text-gray-400 mb-3">🔒 Firebase Secure Login</p>
        <p class="text-xs text-gray-400">Demo Account:</p>
        <p class="text-xs text-blue-400 font-mono mt-1">admin@cakrastore.com</p>
    </div>
</div>

<!-- LOADING SPINNER -->
<div id="loading" class="loading">
    <div class="spinner"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // === FIREBASE INIT ===
    const firebaseConfig = {
        apiKey: "AIzaSyC9tW7wW5Ro4jXXR3BafxAYDdwn7_v2zgk",
        authDomain: "cakrastore-cd2fd.firebaseapp.com",
        databaseURL: "https://cakrastore-cd2fd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cakrastore-cd2fd",
        storageBucket: "cakrastore-cd2fd.firebasestorage.app",
        messagingSenderId: "539073626843",
        appId: "1:539073626843:web:faa8a7df550e5c8256c2fe",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // === HANDLE LOGIN ===
    async function handleLogin(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const loginBtn = document.getElementById('login-btn');
        const loading = document.getElementById('loading');

        // Validasi
        if (!email || !password) {
            showError('Email dan password harus diisi!');
            return;
        }

        if (password.length < 6) {
            showError('Password minimal 6 karakter!');
            return;
        }

        // Show loading
        loading.classList.add('show');
        loginBtn.disabled = true;

        try {
            // Login dengan Firebase
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // Check apakah user adalah admin
            const adminRef = db.ref('admin_users/' + user.uid);
            const snapshot = await adminRef.once('value');

            if (!snapshot.exists()) {
                // User bukan admin - logout
                await auth.signOut();
                showError('❌ Akun ini bukan admin!');
                loading.classList.remove('show');
                loginBtn.disabled = false;
                return;
            }

            const adminData = snapshot.val();

            // Simpan token & info
            localStorage.setItem('admin_logged_in', 'true');
            localStorage.setItem('admin_uid', user.uid);
            localStorage.setItem('admin_email', user.email);
            localStorage.setItem('admin_name', adminData.name || 'Admin');
            localStorage.setItem('admin_role', adminData.role || 'admin');

            // Redirect ke dashboard
            showSuccess('✅ Login berhasil! Redirecting...');
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);

        } catch (error) {
            handleAuthError(error);
            loading.classList.remove('show');
            loginBtn.disabled = false;
        }
    }

    // === HANDLE AUTH ERRORS ===
    function handleAuthError(error) {
        const errorCode = error.code;
        let message = 'Login gagal! Silahkan coba lagi.';

        switch(errorCode) {
            case 'auth/user-not-found':
                message = '❌ Email tidak terdaftar sebagai admin!';
                break;
            case 'auth/wrong-password':
                message = '❌ Password salah!';
                break;
            case 'auth/invalid-email':
                message = '❌ Format email tidak valid!';
                break;
            case 'auth/user-disabled':
                message = '❌ Akun admin telah dinonaktifkan!';
                break;
            case 'auth/too-many-login-attempts':
                message = '⏸️ Terlalu banyak percobaan. Coba lagi nanti.';
                break;
            default:
                message = error.message;
        }

        showError(message);
    }

    // === SHOW ERROR ===
    function showError(message) {
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        errorText.textContent = message;
        errorMsg.classList.add('show');
        console.error(message);
    }

    // === SHOW SUCCESS ===
    function showSuccess(message) {
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        errorMsg.style.background = 'rgba(34, 197, 94, 0.2)';
        errorMsg.style.borderColor = 'rgba(34, 197, 94, 0.4)';
        errorText.style.color = '#86efac';
        errorText.textContent = message;
        errorMsg.classList.add('show');
    }

    // === CHECK SESSION ===
    window.addEventListener('DOMContentLoaded', () => {
        // Jika sudah login, redirect ke dashboard
        if (localStorage.getItem('admin_logged_in')) {
            window.location.href = 'admin.html';
        }

        // Setup auto-logout jika idle
        setupIdleLogout();
    });

    // === SETUP IDLE LOGOUT (30 menit) ===
    let idleTimer = null;
    let idleState = false;
    const idleWait = 1800000; // 30 menit

    function setupIdleLogout() {
        document.addEventListener('mousemove', resetIdleTimer);
        document.addEventListener('keypress', resetIdleTimer);
        document.addEventListener('click', resetIdleTimer);
    }

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleState = false;
        idleTimer = setTimeout(() => {
            idleState = true;
        }, idleWait);
    }
</script>

</body>
</html>
