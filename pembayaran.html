<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran | Cakra Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
    
    :root {
        --bg-primary: #0b0e14;
        --text-primary: #ffffff;
        --text-secondary: #a0aec0;
    }

    :root[data-theme="light"] {
        --bg-primary: #f0f4f9;
        --text-primary: #0f172a;
        --text-secondary: #475569;
    }

    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s, color 0.3s;
    }

    :root[data-theme="dark"] body {
        background-image: 
            radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
            radial-gradient(at 90% 90%, rgba(147, 51, 234, 0.05) 0px, transparent 50%);
    }

    :root[data-theme="light"] body {
        background-image: 
            radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
            radial-gradient(at 90% 90%, rgba(147, 51, 234, 0.08) 0px, transparent 50%);
    }

    .glass { 
        background: rgba(255, 255, 255, 0.03); 
        backdrop-filter: blur(10px); 
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }

    :root[data-theme="light"] .glass {
        background: rgba(255, 255, 255, 0.6);
        border: 1.5px solid rgba(59, 130, 246, 0.25);
        box-shadow: 0 8px 32px rgba(59, 130, 246, 0.12);
    }

    /* MAIN CONTAINER */
    .glass.p-8 {
        background: rgba(26, 31, 41, 0.95);
        border: 2px solid rgba(59, 130, 246, 0.2);
    }

    :root[data-theme="light"] .glass.p-8 {
        background: rgba(248, 250, 252, 0.95);
        border: 2px solid rgba(59, 130, 246, 0.25);
    }

    /* TEXT ELEMENTS */
    h2 {
        color: var(--text-primary);
        text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    :root[data-theme="light"] h2 {
        color: #0f172a;
        text-shadow: none;
    }

    h1 {
        color: var(--text-primary);
        font-weight: 900;
    }

    :root[data-theme="light"] h1 {
        color: #0f172a;
    }

    p {
        color: var(--text-secondary);
    }

    :root[data-theme="light"] p {
        color: #475569;
    }

    /* SPAN TEXT */
    span {
        color: var(--text-primary);
    }

    :root[data-theme="light"] span {
        color: #0f172a;
    }

    /* BLUE TEXT */
    .text-blue-400,
    .text-blue-500 {
        color: #3b82f6 !important;
    }

    :root[data-theme="light"] .text-blue-400,
    :root[data-theme="light"] .text-blue-500 {
        color: #2563eb !important;
    }

    /* YELLOW/TIMER TEXT */
    .text-yellow-500 {
        color: #facc15 !important;
    }

    .bg-yellow-500\/10 {
        background: rgba(250, 204, 21, 0.1) !important;
        border: 1px solid rgba(250, 204, 21, 0.2) !important;
    }

    :root[data-theme="light"] .bg-yellow-500\/10 {
        background: rgba(250, 204, 21, 0.08) !important;
        border: 1px solid rgba(250, 204, 21, 0.25) !important;
    }

    /* DETAIL BOX */
    .flex.justify-between {
        color: var(--text-primary);
    }

    :root[data-theme="light"] .flex.justify-between {
        color: #0f172a;
    }

    /* TAGIHAN BOX */
    .bg-white\/5 {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(59, 130, 246, 0.2) !important;
    }

    :root[data-theme="light"] .bg-white\/5 {
        background: rgba(59, 130, 246, 0.08) !important;
        border: 1px solid rgba(59, 130, 246, 0.3) !important;
    }

    /* QR CONTAINER */
    #qr-container {
        color: var(--text-primary);
    }

    :root[data-theme="light"] #qr-container {
        color: #0f172a;
    }

    /* MANUAL CONTAINER */
    #manual-container {
        color: var(--text-secondary);
    }

    :root[data-theme="light"] #manual-container {
        color: #475569;
    }

    .bg-blue-600\/5 {
        background: rgba(59, 130, 246, 0.05) !important;
        border: 2px solid rgba(59, 130, 246, 0.2) !important;
    }

    :root[data-theme="light"] .bg-blue-600\/5 {
        background: rgba(59, 130, 246, 0.08) !important;
        border: 2px solid rgba(59, 130, 246, 0.3) !important;
    }

    #norek-tujuan {
        color: var(--text-primary);
        font-weight: 900;
    }

    :root[data-theme="light"] #norek-tujuan {
        color: #0f172a;
    }

    /* BUTTON COPY */
    .bg-blue-500\/20 {
        background: rgba(59, 130, 246, 0.2) !important;
    }

    :root[data-theme="light"] .bg-blue-500\/20 {
        background: rgba(59, 130, 246, 0.15) !important;
    }

    /* ACTION BUTTONS */
    .bg-blue-600 {
        background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
    }

    :root[data-theme="light"] .bg-blue-600 {
        background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
    }

    .bg-blue-600:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
    }

    /* DASHED LINE BORDER */
    .receipt-line {
        border-color: rgba(255, 255, 255, 0.1);
    }

    :root[data-theme="light"] .receipt-line {
        border-color: rgba(59, 130, 246, 0.2);
    }

    :root[data-theme="light"] .receipt-line::before,
    :root[data-theme="light"] .receipt-line::after {
        background: var(--bg-primary);
    }

    /* === QRIS DOWNLOAD BUTTON === */
#qr-container button {
    background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
    color: white !important;
    border: 2px solid #1e40af !important;
    padding: 0.75rem 1.5rem !important;
    border-radius: 50px !important;
    font-weight: bold !important;
    font-size: 12px !important;
    text-transform: uppercase !important;
    cursor: pointer !important;
    transition: all 0.3s ease !important;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3) !important;
    letter-spacing: 1px !important;
}

:root[data-theme="light"] #qr-container button {
    background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
    border: 2px solid #1e40af !important;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4) !important;
}

#qr-container button:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5) !important;
}

#qr-container button i {
    margin-right: 8px !important;
    color: white !important;
}

    /* ICON */
    i {
        transition: color 0.3s;
    }

    .text-green-500 {
        color: #22c55e !important;
    }

    /* ITALIC TEXT */
    .italic {
        color: var(--text-secondary);
    }

    :root[data-theme="light"] .italic {
        color: #64748b;
    }

    /* === SEMUA BUTTON DI PAYMENT PAGE === */
button[class*="bg-white"] {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(255, 255, 255, 0.1)) !important;
    border: 1.5px solid rgba(59, 130, 246, 0.3) !important;
    color: #3b82f6 !important;
    transition: all 0.3s ease !important;
}

:root[data-theme="light"] button[class*="bg-white"] {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(59, 130, 246, 0.1)) !important;
    border: 1.5px solid rgba(59, 130, 246, 0.4) !important;
    color: #2563eb !important;
}

button[class*="bg-white"]:hover {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.25), rgba(255, 255, 255, 0.15)) !important;
    border-color: rgba(59, 130, 246, 0.5) !important;
    transform: translateY(-2px) !important;
}

:root[data-theme="light"] button[class*="bg-white"]:hover {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(59, 130, 246, 0.15)) !important;
    transform: translateY(-2px) !important;
}

/* PRINT & STATUS BUTTON */
#btn-status {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(255, 255, 255, 0.05)) !important;
    border: 1.5px solid rgba(59, 130, 246, 0.3) !important;
    color: #3b82f6 !important;
    transition: all 0.3s ease !important;
}

:root[data-theme="light"] #btn-status {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(59, 130, 246, 0.12)) !important;
    border: 1.5px solid rgba(59, 130, 246, 0.4) !important;
    color: #2563eb !important;
}

#btn-status:hover {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(255, 255, 255, 0.1)) !important;
    transform: translateY(-2px) !important;
}

:root[data-theme="light"] #btn-status:hover {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(59, 130, 246, 0.15)) !important;
}

/* WHATSAPP BUTTON */
#btn-wa {
    background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3) !important;
}

:root[data-theme="light"] #btn-wa {
    background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4) !important;
}

#btn-wa:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5) !important;
}
</style>
</head>

<script>
    // INIT THEME DARI LOCAL STORAGE
    function initTheme() {
        const savedTheme = localStorage.getItem('cakra_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
    initTheme();
</script>

<body class="p-6 flex items-center justify-center min-h-screen">

    <div class="glass p-8 w-full max-w-md shadow-2xl border-t-4 border-blue-500 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full"></div>

        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-3 border border-blue-500/30">
                <i class="fas fa-file-invoice text-2xl text-blue-500"></i>
            </div>
            <h2 class="text-xl font-black uppercase italic tracking-tighter text-blue-500">Tagihan Pembayaran</h2>
            <p class="text-[10px] text-gray-500 tracking-widest uppercase mt-1" id="res-trx">CKR-XXXXXX</p>
        </div>

        <div class="flex flex-col items-center mb-6">
            <span class="bg-yellow-500/10 text-yellow-500 text-[10px] font-black px-4 py-1 rounded-full border border-yellow-500/20 mb-2">
                <i class="fas fa-clock mr-1"></i> BAYAR SEBELUM <span id="timer">10:00</span>
            </span>
            <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Status: Menunggu Transfer</p>
        </div>

        <div class="space-y-4 px-2">
            <div class="flex justify-between items-center">
                <span class="text-[11px] text-gray-400 uppercase font-bold">Game / Produk</span>
                <span class="text-[12px] font-black text-white" id="res-game">-</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-[11px] text-gray-400 uppercase font-bold">Item Diamond</span>
                <span class="text-[12px] font-black text-blue-400" id="res-item">-</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-[11px] text-gray-400 uppercase font-bold">Tujuan / ID</span>
                <span class="text-[12px] font-black text-white" id="res-id">-</span>
            </div>
            <div class="flex justify-between items-center border-t border-white/5 pt-3">
                <span class="text-[11px] text-gray-400 uppercase font-bold">Metode Bayar</span>
                <span class="text-[12px] font-black text-green-400" id="res-metode">-</span>
            </div>
        </div>

        <div class="receipt-line"></div>

        <div class="bg-white/5 p-5 rounded-3xl border border-white/10 text-center mb-8 relative">
            <p class="text-[9px] text-gray-400 uppercase font-black mb-1 tracking-widest">Total Tagihan</p>
            <h1 class="text-3xl font-black text-white flex items-center justify-center gap-2">
                <span id="res-harga">Rp 0</span>
                <button onclick="copyText('res-harga')" class="text-sm text-blue-500 hover:text-blue-400 btn-copy">
                    <i class="fas fa-copy"></i>
                </button>
            </h1>
        </div>

        <div id="payment-instruction-container" class="text-center mb-8">
            <div id="qr-container" class="hidden flex flex-col items-center">
                <div class="bg-white p-3 rounded-3xl mb-4 shadow-xl shadow-blue-500/10">
                    <img id="qr-img" src="" class="w-44 h-44">
                </div>
                <button onclick="downloadQR()" class="bg-white/5 px-6 py-2 rounded-full text-[10px] text-white font-bold uppercase tracking-widest hover:bg-white/10 transition-all border border-white/10">
                    <i class="fas fa-download mr-2"></i> Simpan QRIS
                </button>
            </div>

            <div id="manual-container" class="hidden">
                <div class="bg-blue-600/5 p-5 rounded-3xl border border-blue-500/20 relative group">
                    <p class="text-[10px] text-blue-400 uppercase font-black mb-1" id="label-metode">Nomor Tujuan</p>
                    <div class="flex items-center justify-center gap-3">
                        <p class="text-xl font-black text-white tracking-widest" id="norek-tujuan">083188121461</p>
                        <button onclick="copyText('norek-tujuan')" class="w-8 h-8 bg-blue-500/20 rounded-lg flex items-center justify-center text-blue-500 btn-copy">
                            <i class="fas fa-copy text-xs"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-gray-500 mt-3 italic">*Pastikan nominal transfer sesuai sampai digit terakhir</p>
            </div>
        </div>

<div class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
        <button onclick="window.print()" class="glass py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-white/5 transition-all text-gray-400 flex items-center justify-center gap-2">
            <i class="fas fa-print"></i> Cetak
        </button>
        <button id="btn-status" class="glass py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-white/5 transition-all text-blue-500 flex items-center justify-center gap-2">
            <i class="fas fa-search"></i> Status
        </button>
    </div>

    <a id="btn-wa" href="https://wa.me/6283188121461" class="block w-full bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase text-center hover:bg-blue-500 shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2">
        <i class="fab fa-whatsapp text-sm"></i> Konfirmasi Pembayaran
    </a>
</div>
    </div>

<script>
    // Ambil Data dari URL
    const params = new URLSearchParams(window.location.search);
    const game = params.get('game') || "-";
    const item = params.get('item') || "-";
    const idUser = params.get('id') || "-";
    const harga = params.get('harga') || "0";
    const metode = params.get('metode') || "-";
    const trx = params.get('trx') || "CKR-" + Math.floor(Math.random() * 900000);

    // Fungsi Timer (Pindahkan ke luar agar rapi)
    let time = 600;
    function startTimer() {
        const timerEl = document.getElementById('timer');
        if(!timerEl) return;
        
        const countdown = setInterval(() => {
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            timerEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            if (time <= 0) {
                clearInterval(countdown);
                timerEl.innerText = "EXPIRED";
            } else {
                time--;
            }
        }, 1000);
    }

    // Jalankan semua fungsi saat halaman siap
    window.onload = () => {
        // 1. Isi Data ke UI
        document.getElementById('res-game').innerText = game;
        document.getElementById('res-item').innerText = item;
        document.getElementById('res-id').innerText = idUser;
        document.getElementById('res-metode').innerText = metode;
        document.getElementById('res-trx').innerText = trx;
        document.getElementById('res-harga').innerText = "Rp " + parseInt(harga).toLocaleString('id-ID');

        // 2. Logika Tampilan Pembayaran
        if (metode === 'QRIS') {
            document.getElementById('qr-container').classList.remove('hidden');
            document.getElementById('qr-img').src = "qris.jpg"; 
        } else {
            document.getElementById('manual-container').classList.remove('hidden');
            const labelMetode = document.getElementById('label-metode');
            if(labelMetode) labelMetode.innerText = "NOMOR " + metode;
        }

        // 3. Link Tombol Status (Ke transaksi.html membawa data)
        document.getElementById('btn-status').onclick = () => {
            window.location.href = `transaksi.html?trx=${trx}&game=${game}&item=${item}&id=${idUser}`;
        };

        // 4. Jalankan Timer & Notif Telegram
        startTimer();
        kirimKeTelegram();
    };

    // Fungsi Salin Teks
    function copyText(id) {
        const el = document.getElementById(id);
        if(!el) return;
        const text = el.innerText.replace("Rp ", "").replace(/\./g, "");
        navigator.clipboard.writeText(text);
        alert("Berhasil disalin: " + text);
    }

    function downloadQR() {
        const link = document.createElement('a');
        link.href = document.getElementById('qr-img').src;
        link.download = 'QRIS_CakraStore.jpg';
        link.click();
    }

    function kirimKeTelegram() {
        const token = "8088370002:AAHPKlUxrZPxndC2RVOr3vojc-ShGXjmUBU";
        const chatId = "2060108674";
        const nickname = params.get('user') || "Tanpa Nickname";
        const pesan = `🚀 *PESANAN MASUK*\n` +
                      `------------------\n` +
                      `🧾 *TRX:* ${trx}\n` +
                      `🎮 *GAME:* ${game}\n` +
                      `💎 *ITEM:* ${item}\n` +
                      `🆔 *ID:* ${idUser}\n` +
                      `👤 *NICK:* ${nickname}\n` +
                      `💰 *TOTAL:* Rp ${parseInt(harga).toLocaleString('id-ID')}\n` +
                      `💳 *VIA:* ${metode}\n` +
                      `------------------\n` +
                      `⚡ *CEK MUTASI SEKARANG!*`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`);
    }
</script>
</body>
</html>
